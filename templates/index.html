<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MP3 Downloader</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; display: flex; align-items: center; height: 100vh; }
        .card { border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .btn-primary { background-color: #ff0000; border: none; }
        .btn-primary:hover { background-color: #cc0000; }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card p-4">
                    <h2 class="text-center mb-4">🎵 MP3 Downloader</h2>
                    <form action="/download" method="POST" id="downloadForm">
                        <div class="mb-3">
                            <label for="url" class="form-label">Enter YouTube URL</label>
                            <input type="url" class="form-control" name="url" id="url" placeholder="https://www.youtube.com/watch?v=..." required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100" id="btnSubmit">Download MP3</button>
                    </form>
                    <div id="status" class="mt-3 text-center d-none">
                        <div class="spinner-border text-danger" role="status"></div>
                        <p class="mt-2">Processing... Please wait (Converting to MP3)</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('downloadForm').onsubmit = function() {
            document.getElementById('btnSubmit').disabled = true;
            document.getElementById('status').classList.remove('d-none');
        };
    </script>
    <script>
    document.getElementById('downloadForm').onsubmit = function() {
        // Show the spinner
        document.getElementById('btnSubmit').disabled = true;
        document.getElementById('status').classList.remove('d-none');

        // This "fake" timer hides the spinner after 10 seconds 
        // (usually enough time for the download to trigger)
        setTimeout(function() {
            document.getElementById('status').classList.add('d-none');
            document.getElementById('btnSubmit').disabled = false;
        }, 10000); 
    };
</script>
</body>
</html>
